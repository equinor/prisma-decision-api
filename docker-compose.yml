services:
  fastapi:
    build:
      context: .
      dockerfile: fastApi.Dockerfile
    ports:
      - "8000:8000"
    networks:
      - appnet

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    # Running as root for local development (SQLite needs write access to volume)
    user: "0:0"
    ports:
      - "7075:7075"
    depends_on:
      - fastapi
    environment:
      ASPNETCORE_ENVIRONMENT: Research
      FastApiService__BaseUrl: http://fastapi:8000
      ConnectionStrings__SqliteConnection: "Data Source=/data/Prisma.db"
      AllowedOrigins__0: http://localhost:5004
      AllowedOrigins__1: http://127.0.0.1:5004
    volumes:
      - api-data:/data
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  api-data:
