on:
  workflow_call:
    inputs:
      env-name:
        required: true
        type: string

    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_RESOURCE_GROUP:
        required: true
      AZURE_SQL_SERVER_NAME:
        required: true
permissions: {}

jobs:
  run-migration:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.env-name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      - name: OIDC Login to Azure Public Cloud with AzPowershell (enableAzPSSession
          true)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Get IP Address
        id: get_ip
        run: |
          echo "ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Add Firewall Rule
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SQL_SERVER_NAME: ${{ secrets.AZURE_SQL_SERVER_NAME }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az sql server firewall-rule create \
            --resource-group "${RESOURCE_GROUP}" \
            --server "${SQL_SERVER_NAME}" \
            --name AllowGitHubActionsIP \
            --start-ip-address ${{ steps.get_ip.outputs.ip }} \
            --end-ip-address ${{ steps.get_ip.outputs.ip }} \
            --subscription "${SUBSCRIPTION_ID}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install ODBC Driver for SQL Server
        run: |
          # Add Microsoft GPG key and repository
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/20.04/prod focal main" | sudo tee /etc/apt/sources.list.d/mssql-release.list

          # Update package lists and install ODBC Driver
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        run: |
          poetry install

      - name: Run migration
        env:
          APP_ENV: ${{ inputs.env-name }}
        run: |
          poetry run alembic upgrade head

      - name: Remove Firewall Rule
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SQL_SERVER_NAME: ${{ secrets.AZURE_SQL_SERVER_NAME }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az sql server firewall-rule delete \
            --resource-group "${RESOURCE_GROUP}" \
            --server "${SQL_SERVER_NAME}" \
            --name AllowGitHubActionsIP \
            --subscription "${SUBSCRIPTION_ID}"
