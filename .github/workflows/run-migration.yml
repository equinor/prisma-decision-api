on:
  workflow_call:
    inputs:
      env-name:
        required: true
        type: string

    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_RESOURCE_GROUP:
        required: true
      AZURE_SQL_SERVER_NAME:
        required: true
permissions: {}

jobs:
  run-migration:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.env-name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      - name: OIDC Login to Azure Public Cloud with AzPowershell (enableAzPSSession
          true)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Get IP Address
        id: get_ip
        run: |
          echo "ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Add Firewall Rule
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SQL_SERVER_NAME: ${{ secrets.AZURE_SQL_SERVER_NAME }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az sql server firewall-rule create \
            --resource-group "${RESOURCE_GROUP}" \
            --server "${SQL_SERVER_NAME}" \
            --name AllowGitHubActionsIP \
            --start-ip-address ${{ steps.get_ip.outputs.ip }} \
            --end-ip-address ${{ steps.get_ip.outputs.ip }} \
            --subscription "${SUBSCRIPTION_ID}"

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run migration
        working-directory: PrismaDotnetApi/PrismaApi.Infrastructure
        env:
          ASPNETCORE_ENVIRONMENT: ${{ inputs.env-name }}
        run: |
          dotnet ef database update --startup-project ../PrismaApi.Api -- --provider=sqlserver

      - name: Remove Firewall Rule
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SQL_SERVER_NAME: ${{ secrets.AZURE_SQL_SERVER_NAME }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az sql server firewall-rule delete \
            --resource-group "${RESOURCE_GROUP}" \
            --server "${SQL_SERVER_NAME}" \
            --name AllowGitHubActionsIP \
            --subscription "${SUBSCRIPTION_ID}"
