name: run migration in dev environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Check for new migrations since last commit
        id: check
        run: |
          if git diff --name-status HEAD~1 HEAD -- PrismaDotnetApi/SqlServerMigrations/ | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  call-deploy-infra:
    needs: check-migrations
    if: needs.check-migrations.outputs.has_changes == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/run-migration.yml
    with:
      env-name: dev
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_SQL_SERVER_NAME: ${{ secrets.AZURE_SQL_SERVER_NAME }}
