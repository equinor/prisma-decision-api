apiVersion: radix.equinor.com/v1
kind: RadixApplication
metadata:
  name: prisma-decision-api-public
spec:
  environments:
    - name: public
      build:
        from: public|public-deploy*
  components:
    - name: api
      src: .
      dockerfileName: api.Dockerfile
      ports:
        - name: http
          port: 7075
      publicPort: http
      secrets:
        - CLIENT_SECRET
        - APPLICATION_INSIGHTS_CONNECTIONSTRING
      resources:
        requests:
          memory: '2000Mi'
          cpu: '200m'
        limits:
          memory: '10000Mi'
          cpu: '1000m'
        horizontalScaling:
          resources:
            memory:
              averageUtilization: 75
            cpu:
              averageUtilization: 85
          minReplicas: 1
          maxReplicas: 3
      environmentConfig:
        - environment: public
          replicas: 1
          variables:
            ASPNETCORE_ENVIRONMENT: 'Public'
          identity:
            azure:
                clientId: 23042ef9-dbae-40e9-9345-626087966321
    - name: fastapi
      src: .
      dockerfileName: fastApi.Dockerfile
      ports:
        - name: http
          port: 8000
      secrets:
        - CLIENT_SECRET
        - APPINSIGHTS_CONNECTIONSTRING
      resources:
        requests:
          memory: '2000Mi'
          cpu: '200m'
        limits:
          memory: '10000Mi'
          cpu: '1000m'
        horizontalScaling:
          resources:
            memory:
              averageUtilization: 75
            cpu:
              averageUtilization: 85
          minReplicas: 1
          maxReplicas: 3
      environmentConfig:
        - environment: public
          replicas: 1
          variables:
            CLIENT_ID: '418f5a86-0b39-46bb-9a83-ea12b33d8b5b'
            REDIRECT_URL: 'https://api-prisma-decision-api-dev.radix.equinor.com/docs/oauth2-redirect'
            AUDIENCE: "418f5a86-0b39-46bb-9a83-ea12b33d8b5b"
            SCOPE: '418f5a86-0b39-46bb-9a83-ea12b33d8b5b/Read'
            APP_ENV: 'public'
            DATABASE_CONN_PUBLIC: 'DRIVER={ODBC Driver 18 for SQL Server};MARS_Connection=Yes;Server=sql-prisma-decision-public.database.windows.net;Database=sqldb-prisma-decision-public;'
          identity:
            azure:
                clientId: 23042ef9-dbae-40e9-9345-626087966321
